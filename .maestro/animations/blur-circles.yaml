# e2e: Passive Skia animation: two noise-driven gradient circles drift and blur on an infinite loop with no user input. The outcome is simply that the canvas renders; ASSERT the canvas wrapper is visible. [passive — no user input; verified it renders + survives a tap]
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/blur-circles"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/blur-circles--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    id: "blur-circles-canvas"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/blur-circles--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
