# e2e: iOS-style app grid that plays a bouncy zoom-in intro; tap the screen to (re)trigger the bouncy spring animation that settles the icons into place.
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/ios-home-bouncy"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/ios-home-bouncy--mounted"
# this demo raises a native alert (outside the RN view tree)
- tapOn:
    text: "OK"
    optional: true
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: "ios-home-bouncy-screen"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "ready"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/ios-home-bouncy--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
