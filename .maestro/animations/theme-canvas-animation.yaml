# e2e: Skia theme switcher: six selectable color squares around the center; swiping across the canvas sweeps over squares and flood-fills the background. Swipe LEFT then DOWN, then ASSERT the theme changed (theme-canvas-animation-status latches to "theme-changed").
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/theme-canvas-animation"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/theme-canvas-animation--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- swipe:
    from:
      id: "theme-canvas-animation-canvas"
    direction: "LEFT"
- waitForAnimationToEnd:
    timeout: 1500
- swipe:
    from:
      id: "theme-canvas-animation-canvas"
    direction: "DOWN"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "theme-changed"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/theme-canvas-animation--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
