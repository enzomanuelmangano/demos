# e2e: Scroll list of dark cards; tapping any card spawns a Clerk-style stacked toast that animates in and stacks.
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/clerk-toast"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/clerk-toast--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- tapOn:
    id: "clerk-toast-item-0"
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: "clerk-toast-item-1"
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: "clerk-toast-item-2"
- waitForAnimationToEnd:
    timeout: 1500
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "toasts:3"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/clerk-toast--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
