# e2e: A 'Toast!' button that stacks animated toast notifications; toasts can be swiped left to dismiss. Tests spawning toasts and swiping the active one away to the left.
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/toast"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/toast--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- tapOn:
    id: "toast-trigger"
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: "toast-trigger"
- waitForAnimationToEnd:
    timeout: 1500
- swipe:
    from:
      id: "toast-active"
    direction: "LEFT"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "toasts-1"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/toast--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
