# e2e: An OTP screen with an animated face that reacts to typing; tapping the code area focuses a hidden TextInput and entering 1111 drives the face animation. Focus and type the code.
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/verification-code-face"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/verification-code-face--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- tapOn:
    id: "verification-code-face-trigger"
- waitForAnimationToEnd:
    timeout: 1000
- inputText: "1111"
- waitForAnimationToEnd:
    timeout: 1500
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "drawn"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/verification-code-face--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
