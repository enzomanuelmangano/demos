# e2e: Skia image editor whose ButterflyWaveScrawler GL transition progress is driven by a horizontal ruler/scrubber. Drags the scrubber left and right, then ASSERTS the transition progress moved (prequel-slider-status reads "moved", bridged from the worklet progressPercentage value).
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/prequel-slider"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/prequel-slider--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- swipe:
    from:
      id: "prequel-slider-scrubber"
    direction: "LEFT"
- waitForAnimationToEnd:
    timeout: 1800
- swipe:
    from:
      id: "prequel-slider-scrubber"
    direction: "RIGHT"
- waitForAnimationToEnd:
    timeout: 1800
- assertVisible:
    text: "moved"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/prequel-slider--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
