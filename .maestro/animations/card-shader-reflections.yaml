# e2e: Skia shader credit-card carousel with animated holographic reflections; the demo animates on its own with no required interaction. [passive — no user input; verified it renders + survives a tap]
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/card-shader-reflections"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/card-shader-reflections--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "ready"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/card-shader-reflections--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
