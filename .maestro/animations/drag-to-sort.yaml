# e2e: A vertical sortable list where a long-press-drag reorders items with animated reflow and border-radius feedback on the active row. Tests dragging the top item down past others to reorder.
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/drag-to-sort"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/drag-to-sort--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- swipe:
    from:
      id: "drag-to-sort-item-0"
    direction: "DOWN"
- waitForAnimationToEnd:
    timeout: 2000
- swipe:
    from:
      id: "drag-to-sort-item-0"
    direction: "UP"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "reordered"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/drag-to-sort--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
