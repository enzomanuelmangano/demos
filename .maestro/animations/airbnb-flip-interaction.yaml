# e2e: Airbnb-style profile card; tap the card to play the 3D rotateY flip revealing the back face, then capture the flipped state.
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/airbnb-flip-interaction"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/airbnb-flip-interaction--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- tapOn:
    id: "airbnb-flip-card"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "flipped"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/airbnb-flip-interaction--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
