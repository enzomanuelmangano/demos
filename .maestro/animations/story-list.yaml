# e2e: Horizontal paged story carousel with snapToInterval; swipe LEFT to page through stories with a coverflow transform. ASSERT the carousel paged (story-list-status latches to "paged").
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/story-list"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/story-list--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- swipe:
    from:
      id: "story-list"
    direction: "LEFT"
- waitForAnimationToEnd:
    timeout: 1500
- swipe:
    from:
      id: "story-list"
    direction: "LEFT"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "paged"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/story-list--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
