# e2e: Full-screen Skia drawing canvas: the user draws a freehand path with a pan gesture, then on release the Fourier series animates epicycles redrawing that path. Tests drawing a stroke across the canvas.
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/fourier-visualizer"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/fourier-visualizer--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- swipe:
    from:
      id: "fourier-visualizer-canvas"
    direction: "RIGHT"
- swipe:
    from:
      id: "fourier-visualizer-canvas"
    direction: "DOWN"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "drawn"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/fourier-visualizer--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
