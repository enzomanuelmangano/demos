# e2e: Centered Skia paper that folds/unfolds via a spring; a full-screen pressable toggles the fold progress between 0 and 1.
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/paper-folding"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/paper-folding--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- tapOn:
    id: "paper-folding"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "paper-folding"
- waitForAnimationToEnd:
    timeout: 2000
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "folds:2"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/paper-folding--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
