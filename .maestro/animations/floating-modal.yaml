# e2e: Tap the floating action button to morph it into the centered modal; ASSERTS the open outcome (floating-modal-status reads "shown").
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/floating-modal"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/floating-modal--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- tapOn:
    id: "floating-modal-trigger"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    text: "shown"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/floating-modal--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
