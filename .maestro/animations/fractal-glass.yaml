# e2e: A draggable colored circle behind a Skia fractal-glass mask that refracts the circle into vertical glass strips; a FAB toggles light/dark theme. Tests dragging the circle across the glass and toggling the theme.
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/fractal-glass"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/fractal-glass--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- swipe:
    from:
      id: "fractal-glass-circle"
    direction: "UP"
- waitForAnimationToEnd:
    timeout: 1500
- swipe:
    from:
      id: "fractal-glass-circle"
    direction: "LEFT"
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: "fractal-glass-fab"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "dark-moved"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/fractal-glass--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
