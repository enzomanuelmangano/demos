# e2e: Animated count display driven by a vertical draggable ruler/wheel; a button toggles expanded line spacing. Swipes the wheel up and down then taps expand, and ASSERTS the picked value changed (wheel-picker-status reads "changed", bridged from the worklet count value).
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/wheel-picker"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/wheel-picker--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- swipe:
    from:
      id: "wheel-picker-wheel"
    direction: "UP"
- waitForAnimationToEnd:
    timeout: 1200
- swipe:
    from:
      id: "wheel-picker-wheel"
    direction: "DOWN"
- tapOn:
    id: "wheel-picker-expand"
- waitForAnimationToEnd:
    timeout: 1200
- assertVisible:
    text: "changed"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/wheel-picker--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
