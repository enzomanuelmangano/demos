# e2e: Swipe horizontally to page through the carousel; ASSERTS the page outcome (color-carousel-status reads "carousel:moved").
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/color-carousel"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/color-carousel--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- swipe:
    from:
      id: "color-carousel"
    direction: "LEFT"
- waitForAnimationToEnd:
    timeout: 2000
- swipe:
    from:
      id: "color-carousel"
    direction: "LEFT"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "carousel:moved"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/color-carousel--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
