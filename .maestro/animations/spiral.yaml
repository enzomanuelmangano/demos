# e2e: Full-screen Skia logarithmic spiral; a full-screen invisible pressable re-randomizes the spiral angle on each tap. Tap twice, then ASSERT the tap counter (spiral-status reads "spiral-taps:2").
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/spiral"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/spiral--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- tapOn:
    id: "spiral-canvas"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: "spiral-canvas"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "spiral-taps:2"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/spiral--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
