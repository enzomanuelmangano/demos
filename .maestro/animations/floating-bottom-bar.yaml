# e2e: Floating bottom tab bar (icon tabs); tap the rightmost (settings) then second (bookmark) tab, then ASSERT the active tab (floating-bottom-bar-status reads "tab:bookmark").
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/floating-bottom-bar"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/floating-bottom-bar--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- tapOn:
    id: "floating-bottom-bar-tab-settings"
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: "floating-bottom-bar-tab-bookmark"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "tab:bookmark"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/floating-bottom-bar--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
