# e2e: Analog Skia clock driven by a vertical time-slot wheel; swipe the wheel up to scroll later times and watch the clock hands interpolate.
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/clock-time-picker"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/clock-time-picker--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- swipe:
    from:
      id: "clock-time-picker-wheel"
    direction: "UP"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "moved"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/clock-time-picker--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
