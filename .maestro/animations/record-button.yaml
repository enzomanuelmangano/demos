# e2e: Inverted FlatList; swiping up morphs a record button via scroll-driven progress interpolation and triggers the snap.
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/record-button"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/record-button--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- swipe:
    from:
      id: "record-button-scroll"
    direction: "UP"
- waitForAnimationToEnd:
    timeout: 2000
- swipe:
    from:
      id: "record-button-scroll"
    direction: "UP"
- waitForAnimationToEnd:
    timeout: 2000
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "morphed"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/record-button--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
