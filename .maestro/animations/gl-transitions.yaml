# e2e: Notes app whose 'Add Note' (+) header button navigates to an AddNote screen via a GLSL DirectionalWarp transition. Taps + to trigger the transition, then ASSERTS the add-note screen actually mounted (gl-transitions-status reads "addnote").
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/gl-transitions"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/gl-transitions--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- tapOn:
    id: "gl-transitions-add"
- waitForAnimationToEnd:
    timeout: 2500
- assertVisible:
    text: "addnote"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/gl-transitions--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
