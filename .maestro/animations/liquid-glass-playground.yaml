# e2e: Full-screen liquid-glass blur overlay over a photo with a vertical drag/parallax; the glass surface renders its refraction effect without any required interaction. [passive — no user input; verified it renders + survives a tap]
appId: com.reactiive.app
---
- launchApp
- openLink: "demos://animations/liquid-glass-playground"
# prove the demo actually mounted (not the "Animation … not found" screen)
- extendedWaitUntil:
    notVisible: "not found"
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/liquid-glass-playground--mounted"
# --- the demo's own interaction (real HID touches; Skia hit-tests the point) ---
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    text: "ready"
    timeout: 4000
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: ".maestro/artifacts/liquid-glass-playground--after"
# still on the demo (didn't bounce to not-found) and not crashed
- assertNotVisible: "not found"
